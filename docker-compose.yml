services:
  db:
    image: postgres:16-alpine
    container_name: miora_db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-miora}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: miora_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${APP_PORT:-8082}:${APP_PORT:-8082}"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: miora_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - "3002:3000"
    depends_on:
      - backend

  agent:
    build: ./agent
    container_name: miora_agent
    restart: unless-stopped
    env_file:
      - ./agent/.env
    ports:
      - "8090:8090"

volumes:
  pgdata:
